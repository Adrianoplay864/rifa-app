<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rifa Fundação Esperança</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 20px;
        text-align: center;
      }

      .container {
        max-width: 900px;
        margin: auto;
      }

      .info {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
        gap: 8px;
        max-height: 70vh;
        overflow-y: auto;
      }

      .numero {
        padding: 10px;
        border-radius: 6px;
        background: white;
        border: 1px solid #ddd;
        cursor: pointer;
        font-weight: bold;
      }

      .pago {
        background: #27ae60;
        color: white;
      }

      .pendente {
        background: #f39c12;
        color: white;
      }

      button {
        width: 100%;
        padding: 10px;
        margin: 6px 0;
        background: #3498db;
        color: white;
        border: none;
      }

      .admin {
        background: #2c3e50;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="info">
        <h1>Rifa Fundação Esperança</h1>
        <p><b>Sorteio:</b> Ao vivo pelo TikTok em 30/09/2026<br>@fundacion__esperanza</p>
        <p>
          <strong>Prêmios:<br />1° - R$ 5.000<br />2° - R$ 2.000</strong>
        </p>
        <p><b>Valor por número:</b> R$ 25</p>
      </div>

      <!-- 🔐 BOTÃO ADMIN -->
      <button class="admin" onclick="login()">Login Administrador</button>

      <h3>Escolha seu número</h3>
      <div class="grid" id="rifa"></div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

      import {
        getFirestore,
        doc,
        setDoc,
        getDocs,
        deleteDoc,
        collection,
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

      import {
        getAuth,
        signInWithPopup,
        GoogleAuthProvider,
        onAuthStateChanged
      } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCkuWF4GInXQMRm7iGdLC-psSLASmKvS84",
        authDomain: "rifa-fundacion.firebaseapp.com",
        projectId: "rifa-fundacion",
        storageBucket: "rifa-fundacion.firebasestorage.app",
        messagingSenderId: "189625285000",
        appId: "1:189625285000:web:a99bcfe045db4e2655223d",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // 🔐 AUTH
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();

      let usuarioLogado = null;

      onAuthStateChanged(auth, (user) => {
        usuarioLogado = user;
        console.log("Logado:", user?.email);
      });

      async function login() {
        await signInWithPopup(auth, provider);
        alert("Login realizado!");
      }

      window.login = login;

      const VALOR_TOTAL = 25;
      const rifa = document.getElementById("rifa");

      let numeroAtual = null;
      let dados = {};

      // criar números
      for (let i = 0; i <= 99; i++) {
        let numero = document.createElement("div");
        numero.textContent = String(i).padStart(2, "0");
        numero.classList.add("numero");

        numero.onclick = () => abrir(numero.textContent);
        rifa.appendChild(numero);
      }

      async function carregar() {
        const snapshot = await getDocs(collection(db, "rifa"));

        snapshot.forEach((docSnap) => {
          dados[docSnap.id] = docSnap.data();
        });

        atualizarTela();
      }

      function atualizarTela() {
        document.querySelectorAll(".numero").forEach((n) => {
          let d = dados[n.textContent];

          n.classList.remove("pago", "pendente");

          if (d) {
            n.classList.add(d.estado);
          }
        });
      }

      function abrir(numero) {

        // 🔒 BLOQUEIO
        if (!usuarioLogado) {
          alert("Somente administrador pode editar");
          return;
        }

        numeroAtual = numero;

        let nome = prompt("Nome:");
        let telefone = prompt("Telefone:");
        let valor = parseInt(prompt("Valor pago:")) || 0;

        salvar(numero, nome, telefone, valor);
      }

      async function salvar(numero, nome, telefone, valorNovo) {

        if (!usuarioLogado) return;

        let antigo = dados[numero] || {};
        let total = (antigo.valor || 0) + valorNovo;

        let estado = total >= VALOR_TOTAL ? "pago" : "pendente";

        let novo = {
          nome: nome || antigo.nome || "",
          telefone: telefone || antigo.telefone || "",
          valor: total,
          estado,
        };

        await setDoc(doc(db, "rifa", numero), novo);

        dados[numero] = novo;

        atualizarTela();
      }

      async function zerarNumero() {

        if (!usuarioLogado) return;

        if (!confirm("Tem certeza que deseja liberar este número?")) return;

        await deleteDoc(doc(db, "rifa", numeroAtual));

        delete dados[numeroAtual];

        atualizarTela();
      }

      carregar();
    </script>
  </body>
</html>
